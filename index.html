// বিষয়গুলো পুরো রুটিন জুড়ে সমানভাবে (proportionally) ছড়িয়ে দেওয়া হয়,
// যাতে কোনো একটা সাবজেক্ট (যেমন বেশি টপিকওয়ালা বাংলা ২য়) একটানা কয়েকদিন ধরে না চলে।
// সাবজেক্টগুলোকে ইচ্ছাকৃতভাবে ছড়িয়ে রাখা হয়েছে, যাতে একই বিষয়ের ১ম ও ২য় পত্র
// (যেমন বাংলা ১ম/২য়, ইংরেজি ১ম/২য়) কখনো পরপর বা একই দিনে না পড়ে।
const SUBJECT_ORDER = ["বাংলা ১ম","ইংরেজি ১ম","গণিত","বিজ্ঞান","বাংলা ২য়",
  "ভূগোল ও পরিবেশ","ইংরেজি ২য়","ইসলাম শিক্ষা","অর্থনীতি","আইসিটি","বাংলাদেশ ও বিশ্বপরিচয়"];

function interleaveBySubject(items){
  // রাউন্ড-রবিন: প্রতি রাউন্ডে প্রতিটি সাবজেক্ট থেকে ঠিক ১টি করে টপিক নেওয়া হয় (তাই
  // একই সাবজেক্ট কখনো পরপর আসে না), আর প্রতি রাউন্ডে ক্রম একটু ঘুরিয়ে দেওয়া হয় যাতে
  // দিনে দিনে বিষয়ের জোড়া বদলাতে থাকে এবং একঘেয়ে না লাগে।
  const groups={};
  items.forEach(it=>{
    if(!groups[it.subj])groups[it.subj]=[];
    groups[it.subj].push(it);
  });
  const order=SUBJECT_ORDER.filter(s=>groups[s]);
  const result=[];
  let round=0, remaining=true;
  while(remaining){
    remaining=false;
    const off=round%order.length;
    const rotated=order.slice(off).concat(order.slice(0,off));
    rotated.forEach(subj=>{
      if(groups[subj].length){
        result.push(groups[subj].shift());
        remaining=true;
      }
    });
    round++;
  }
  return result;
}

function addDays(dateStr,n){const d=new Date(dateStr+"T00:00:00");d.setDate(d.getDate()+n);return d.toISOString().split("T")[0];}
function dateDiffDays(a,b){return Math.round((new Date(b+"T00:00:00")-new Date(a+"T00:00:00"))/86400000);}

function sessionDuration(subj){return subj==="গণিত"?90:75;} // গণিত ১ঘ.৩০মি, বাকি সব ১ঘ.১৫মি

function buildPlan(){
  const plan=[];
  const totalDays=dateDiffDays(ROUTINE_START,ROUTINE_END)+1;
  let topicIdx=0, revIdx=0;
  for(let i=0;i<totalDays;i++){
    const date=addDays(ROUTINE_START,i);
    const dow=new Date(date+"T00:00:00").getDay();
    const isFriday=dow===5;
    const dayObj={date,day:BN_DAYS[dow],holiday:isFriday,note:"",sessions:[]};

    if(date===addDays(ROUTINE_END,-1)){
      dayObj.note="🎯 Mock Test Day";
      dayObj.sessions.push({sH:9,sM:0,eH:12,eM:0,subj:"সব বিষয়",topic:"পূর্ণাঙ্গ Mock Test — নিজেকে যাচাই করো",type:"mock",icon:"📝"});
      dayObj.sessions.push({sH:19,sM:30,eH:21,eM:0,subj:"সব বিষয়",topic:"Mock Test খাতা মিলিয়ে ভুল বের করা",type:"revision",icon:"🔍"});
    } else if(date===ROUTINE_END){
      dayObj.note="⭐ চূড়ান্ত রিভিশন দিন";
      dayObj.sessions.push({sH:9,sM:0,eH:11,eM:0,subj:"সব বিষয়",topic:"দুর্বল জায়গাগুলো শেষবার দেখা",type:"revision",icon:"🎯"});
      dayObj.sessions.push({sH:19,sM:30,eH:21,eM:0,subj:"প্রস্তুতি",topic:"স্টেশনারি গোছানো + মানসিক প্রস্তুতি, আগামীকাল পরীক্ষা!",type:"prep",icon:"🎒"});
    } else if(topicIdx<NEW_TOPICS.length){
      let h=19,m=30;
      for(let s=0;s<2;s++){
        if(topicIdx<NEW_TOPICS.length){
          const t=NEW_TOPICS[topicIdx++];
          const dur=sessionDuration(t.subj);
          let eh=h,em=m+dur; while(em>=60){em-=60;eh++;}
          dayObj.sessions.push({sH:h,sM:m,eH:eh,eM:em,subj:t.subj,topic:t.topic,type:"new",icon:t.icon});
          h=eh;m=em;
        }
      }
    } else {
      let h=19,m=30;
      for(let s=0;s<2;s++){
        const r=REV_SUBJECTS[revIdx%REV_SUBJECTS.length];revIdx++;
        const dur=sessionDuration(r.subj);
        let eh=h,em=m+dur; while(em>=60){em-=60;eh++;}
        dayObj.sessions.push({sH:h,sM:m,eH:eh,eM:em,subj:r.subj,topic:r.subj+" — সম্পূর্ণ রিভিশন 🔁",type:"revision",icon:r.icon});
        h=eh;m=em;
      }
    }
    plan.push(dayObj);
  }
  return plan;
}

const BN=["০","১","২","৩","৪","৫","৬","৭","৮","৯"];
function bn(n){return String(n).split("").map(d=>BN[+d]||d).join("");}
function fmt(h,m){
  let L;
  if(h>=4&&h<6)L="ভোর"; else if(h>=6&&h<12)L="সকাল";
  else if(h>=12&&h<15)L="দুপুর"; else if(h>=15&&h<17)L="বিকাল";
  else if(h>=17&&h<19)L="সন্ধ্যা"; else L="রাত";
  const h12=h%12===0?12:h%12;
  return L+" "+bn(h12)+(m?":"+bn(m):"")+"টা";
}

const MONTHS=["জানু","ফেব্রু","মার্চ","এপ্রিল","মে","জুন","জুলাই","আগস্ট","সেপ্টে","অক্টো","নভে","ডিসে"];
function shortDate(d){const x=new Date(d);return bn(x.getDate())+" "+MONTHS[x.getMonth()];}

function isToday(d){return new Date().toDateString()===new Date(d).toDateString();}
function isPast(d){const t=new Date();t.setHours(0,0,0,0);return new Date(d)<t;}
function daysLeft(){const t=new Date();t.setHours(0,0,0,0);return Math.ceil((EXAM_DATE-t)/86400000);}

function curSi(di){
  const now=new Date();
  if(PLAN[di].date!==now.toISOString().split("T")[0])return -1;
  const nm=now.getHours()*60+now.getMinutes();
  return PLAN[di].sessions.findIndex(s=>nm>=s.sH*60+s.sM&&nm<s.eH*60+s.eM);
}

    btn.className="day-btn"+(act?" active":"")+(today?" today":"")+(past?" past":"");

      html+='<div class="ov-tag" style="background:#080f1e;border:1px solid '+dc+'55;border-left:2px solid '+dc+';color:'+dc+';text-decoration:'+(isDone?"line-through":"none")+';opacity:'+(isDone?"0.4":"1")+'">';
      html+=s.icon+" "+s.subj+(s.type==="revision"?" 🔁":s.type==="mock"?" 📝":"");
      html+='</div>';
    });
    html+='</div></div>';
  });
  el.innerHTML=html;
}

function renderStoryList(){
  const el=document.getElementById("viewStory");
  let html='<div style="font-size:11px;color:#64748b;margin-bottom:10px">বাংলা ১ম পত্রের গল্প ও কবিতার মূল কাহিনী — ট্যাপ করে পড়ো 👇</div>';
  STORIES.forEach((s,i)=>{
    html+='<div class="story-card" onclick="showStory('+i+')">';
    html+='<div class="st-type">'+s.type+'</div>';
    html+='<div class="st-title">'+s.title+'</div>';
    html+='<div class="st-author">'+s.author+'</div>';

function showStory(i){
  const s=STORIES[i];
  const el=document.getElementById("viewStory");
  let html='<div class="story-detail">';
  html+='<button class="sd-back" onclick="renderStoryList()">← সব গল্প</button>';
  html+='<div class="sd-title">'+s.title+'</div>';
  html+='<div class="sd-author">'+s.type+' • '+s.author+'</div>';
  html+='<div class="sd-body">'+s.body+'</div>';
  html+='</div>';
  el.innerHTML=html;
}

/* ================= INIT ================= */
function init(){
  loadDone();
  const ti = PLAN.findIndex(d=>isToday(d.date));
  if(ti>=0) activeDay=ti;
  else {
    const now=new Date();
    activeDay = now < new Date(ROUTINE_START+"T00:00:00") ? 0 : PLAN.length-1;
  }
  document.getElementById("motivDiv").textContent="💬 "+MOTIVS[Math.floor(Math.random()*MOTIVS.length)];
  updateExamPill();
  updateProgress();
  renderDayStrip();
  renderDayCard();
  setInterval(()=>{if(currentView==="daily")renderDayCard();},60000);
}
init();
