<style>
:root{--teal:#1a6b5a;--gold:#c8993a;--cream:#f9f5ef;--dark:#0f2d26;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Hind Siliguri',sans-serif;background:var(--cream);color:#1e3d35;max-width:480px;margin:0 auto;}
header{background:linear-gradient(135deg,var(--dark) 0%,var(--teal) 100%);padding:16px;text-align:center;color:#fff;}
.app-title{font-family:'Amiri',serif;font-size:2rem;color:#e8ba5a;}
nav{display:flex;background:var(--dark);overflow-x:auto;}
nav button{flex:1;padding:10px 4px;background:none;border:none;color:rgba(255,255,255,.45);font-size:.7rem;cursor:pointer;border-bottom:3px solid transparent;}
nav button.active{color:#e8ba5a;border-bottom:3px solid var(--gold);}
main{padding:14px;}
.tab-content{display:none;}
.tab-content.active{display:block;}
.date-card{background:linear-gradient(135deg,var(--teal) 0%,#22897a 100%);border-radius:16px;padding:14px;color:#fff;margin-bottom:14px;}
.prayer-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px;}
.prayer-card{background:#fff;border-radius:13px;padding:13px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.1);}
.prayer-card.next{background:var(--gold);color:#fff;}
.picon{font-size:1.5rem;}
.ptime{font-size:1rem;font-weight:700;}
.loc-btn{width:100%;padding:11px;background:#fff;border:2px dashed var(--teal);border-radius:11px;color:var(--teal);cursor:pointer;margin-bottom:14px;}
.loading{text-align:center;padding:20px;color:#6b8f87;}
.spinner{width:24px;height:24px;border:3px solid #e0ede9;border-top:3px solid var(--teal);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 8px;}
@keyframes spin{to{transform:rotate(360deg);}}
.surah-search{width:100%;padding:10px;border:2px solid #e0ede9;border-radius:10px;margin-bottom:10px;}
.surah-list{display:flex;flex-direction:column;gap:7px;}
.surah-item{background:#fff;border-radius:10px;padding:10px;display:flex;gap:10px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.1);}
.snum{width:32px;height:32px;background:var(--teal);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;}
.hadith-card{background:#fff;border-radius:12px;padding:16px;margin-bottom:10px;border-left:4px solid var(--gold);}
.hadith-ar{font-family:'Amiri',serif;font-size:1.1rem;direction:rtl;text-align:right;margin-bottom:8px;}
.hadith-bn{font-size:.85rem;line-height:1.6;margin-bottom:8px;}
.hadith-actions{display:flex;gap:9px;margin-top:10px;}
.h-btn{flex:1;padding:10px;border:none;border-radius:10px;cursor:pointer;font-size:.85rem;font-family:'Hind Siliguri',sans-serif;}
.h-audio-btn{background:var(--teal);color:#fff;}
.h-next-btn{background:#fff;border:2px solid var(--teal);color:var(--teal);}
.tasbih-circle{width:180px;height:180px;border-radius:50%;background:linear-gradient(135deg,var(--dark) 0%,var(--teal) 100%);color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:20px auto;cursor:pointer;font-size:3rem;}
.tasbih-count{font-weight:700;}
.btn{padding:10px 16px;background:var(--teal);color:#fff;border:none;border-radius:8px;cursor:pointer;}
</style>
</head>

// TAB SWITCH
function switchTab(tab,btn){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  btn.classList.add('active');
}

// DATE
const now=new Date();
document.getElementById('greg-date').textContent=now.toLocaleDateString('bn-BD',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

// PRAYER TIMES
const pIds=['fajr','dhuhr','asr','maghrib','isha'];
const pKeys=['Fajr','Dhuhr','Asr','Maghrib','Isha'];

async function fetchPrayerTimes(lat,lon,locName){
  document.getElementById('prayer-loading').style.display='block';
  document.getElementById('loc-btn').style.display='none';
  try{
    const d=now;
    const url='https://api.aladhan.com/v1/timings/'+d.getDate()+'-'+(d.getMonth()+1)+'-'+d.getFullYear()+'?latitude='+lat+'&longitude='+lon+'&method=1';
    const res=await fetch(url);
    const data=await res.json();
    const t=data.data.timings;
    for(let i=0;i<pKeys.length;i++){
      const time=t[pKeys[i]];
      const parts=time.split(':');
      const h=parseInt(parts[0]);
      const m=parseInt(parts[1]);
      document.getElementById('t-'+pIds[i]).textContent=(h%12||12)+':'+(m<10?'0':'')+m+' '+(h>=12?'PM':'AM');
    }
    document.getElementById('location-text').textContent=locName;
  }catch(e){alert('নামাজের সময় লোড হয়নি');}
  document.getElementById('prayer-loading').style.display='none';
}

function getLocation(){
  if(!navigator.geolocation){
    fetchPrayerTimes(23.8103,90.4125,'ঢাকা');
    return;
  }
  document.getElementById('prayer-loading').style.display='block';
  navigator.geolocation.getCurrentPosition(
    pos=>{
      fetchPrayerTimes(pos.coords.latitude,pos.coords.longitude,'আপনার এলাকা');
    },
    err=>{
      fetchPrayerTimes(23.8103,90.4125,'ঢাকা');
    },
    {timeout:10000}
  );
}

let hadithIdx=0;

function renderHadith(){
  const h=hadiths[hadithIdx];
  document.getElementById('hadith-display').innerHTML='<div class="hadith-card"><div class="hadith-ar">'+h.ar+'</div><div class="hadith-bn">'+h.bn+'</div><div style="font-size:0.75rem;color:#6b8f87;">📚 '+h.src+'</div></div>';
}

function nextHadith(){
  hadithIdx=(hadithIdx+1)%hadiths.length;
  renderHadith();
}

function toggleHadithAudio(){
  if(window.speechSynthesis){
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(hadiths[hadithIdx].bn);
    u.lang='bn-BD';
    window.speechSynthesis.speak(u);
  }
}

renderHadith();

const tasbihMax=33;

function tapTasbih(){
  if(tasbihCount>=tasbihMax){
    tasbihCount=0;
  }else{
    tasbihCount++;
  }
  document.getElementById('tasbih-count').textContent=tasbihCount;
}

function resetTasbih(){
  tasbihCount=0;
  document.getElementById('tasbih-count').textContent='0';
}

// QIBLA
function getQibla(){
  if(!navigator.geolocation){alert('লোকেশন সাপোর্ট নেই');return;}
  navigator.geolocation.getCurrentPosition(pos=>{
    const lat=pos.coords.latitude,lon=pos.coords.longitude;
    const mLat=21.3891,mLon=39.8579;
    const dLon=(mLon-lon)*Math.PI/180;
    const lat1=lat*Math.PI/180,lat2=mLat*Math.PI/180;
    const y=Math.sin(dLon)*Math.cos(lat2);
    const x=Math.cos(lat1)*Math.sin(lat2)-Math.sin(lat1)*Math.cos(lat2)*Math.cos(dLon);
    let bearing=Math.atan2(y,x)*180/Math.PI;
    bearing=(bearing+360)%360;
    document.getElementById('qibla-degree').textContent=Math.round(bearing)+'°';
  },()=>{alert('লোকেশন পাওয়া যায়নি');});
}
